<!-- prettier-ignore -->
<!DOCTYPE html>

<!-- prettier-ignore -->
<html lang="en" class="bg-black" style="background-color: #000;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="A polished, single-page TMDb-powered movie/tv browser app.">
    <title>CORE // ARCHIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@500;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #E2D4E0;
            --accent-rgb: 226, 212, 224;
            --bg-base: #030303;
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(15, 15, 15, 0.6);
        }

        html {
            background-color: var(--bg-base) !important;
            color-scheme: dark !important;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-base) !important;
            color: #e2e8f0;
            font-family: 'Outfit', sans-serif;
            margin: 0; padding: 0; 
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            -webkit-user-select: none;
            user-select: none;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.04;
            pointer-events: none;
            z-index: 9999;
            transform: translateZ(0);
        }

        .font-display { font-family: 'Syne', sans-serif; }
        .font-mono-tech { font-family: 'Space Mono', monospace; }

        .text-accent { color: var(--accent) !important; }
        .bg-accent { background-color: var(--accent) !important; color: #000 !important; }
        .border-accent { border-color: var(--accent) !important; }

        .hover-text-accent:hover { color: var(--accent) !important; text-shadow: 0 0 15px rgba(var(--accent-rgb), 0.5); }
        .hover-border-accent:hover { border-color: var(--accent) !important; box-shadow: 0 0 20px rgba(var(--accent-rgb), 0.2); }
        .hover-bg-accent:hover { background-color: var(--accent) !important; color: #000 !important; box-shadow: 0 0 25px rgba(var(--accent-rgb), 0.4); }

        .group:hover .group-hover-text-accent { color: var(--accent) !important; }
        .group:hover .group-hover-border-accent { border-color: var(--accent) !important; }

        .focus-within-ring-accent:focus-within {
            outline: none;
            box-shadow: 0 0 0 2px #000, 0 0 0 4px var(--accent), 0 0 20px rgba(var(--accent-rgb), 0.5);
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            transform: translateZ(0);
        }

        .btn-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateZ(0);
            min-width: 48px;
            min-height: 48px;
        }

        @media (hover: hover) and (pointer: fine) {
            .btn-glass:hover {
                background: rgba(var(--accent-rgb), 0.1);
                border-color: var(--accent);
                transform: translate3d(0, -2px, 0);
                box-shadow: 0 10px 30px -10px rgba(var(--accent-rgb), 0.5);
            }
        }
        .btn-glass:active { transform: scale(0.95); }

        .btn-glow {
            background: linear-gradient(135deg, rgba(var(--accent-rgb), 0.9), rgba(var(--accent-rgb), 0.6));
            color: #fff !important;
            border: 1px solid var(--accent);
            box-shadow: 0 0 20px rgba(var(--accent-rgb), 0.3);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateZ(0);
            min-width: 48px;
            min-height: 48px;
        }

        @media (hover: hover) and (pointer: fine) {
            .btn-glow:hover {
                box-shadow: 0 0 40px rgba(var(--accent-rgb), 0.6);
                transform: translate3d(0, -2px, 0) scale(1.02);
            }
        }
        .btn-glow:active { transform: scale(0.95); }

        .media-card {
            position: relative;
            border-radius: 1.25rem;
            overflow: hidden;
            background: #0a0a0a;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.2s ease-out, border-color 0.4s, box-shadow 0.4s;
            transform: translate3d(0,0,0); 
            will-change: transform, box-shadow;
            cursor: pointer;
        }

        @media (hover: hover) and (pointer: fine) {
            .media-card:hover {
                transform: translate3d(0, -8px, 0) scale(1.03);
                border-color: rgba(var(--accent-rgb), 0.5);
                box-shadow: 0 20px 40px -10px rgba(0,0,0,0.8), 0 0 30px -10px rgba(var(--accent-rgb), 0.3); 
                z-index: 20;
            }
        }
        .media-card:active { transform: scale(0.96); z-index: 20; }

        .card-overlay {
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.6) 40%, transparent 100%);
            opacity: 1 !important;
            transition: opacity 0.3s ease;
            will-change: opacity;
        }

        .title-logo-target {
            transition: opacity 0.3s ease;
            transform: translateY(0) !important;
        }

        .ticker-wrap {
            overflow: hidden; white-space: nowrap;
            background: linear-gradient(90deg, transparent, rgba(var(--accent-rgb), 0.05) 50%, transparent);
            border-top: 1px solid rgba(255, 255, 255, 0.05); border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transform: translateZ(0);
        }
        .ticker-content { display: inline-block; animation: ticker 25s linear infinite; will-change: transform; }
        @keyframes ticker { 0% { transform: translate3d(100vw, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }

        .nav-link {
            position: relative;
            color: rgba(255,255,255,0.6);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-active { color: var(--accent) !important; }
        .nav-active svg { filter: drop-shadow(0 0 10px rgba(var(--accent-rgb), 0.6)); }

        .skeleton-container {
            position: relative;
            overflow: hidden;
            background: #060606;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            transform: translateZ(0);
        }

        .skeleton-container::before {
            content: ""; position: absolute; inset: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px; background-position: center; opacity: 0.8; pointer-events: none;
        }

        @keyframes tech-slide { 0% { transform: translate3d(-100%, 0, 0); } 100% { transform: translate3d(100%, 0, 0); } }

        .input-glass {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            min-height: 48px;
        }
        .input-glass:focus {
            background: rgba(var(--accent-rgb), 0.05);
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(var(--accent-rgb), 0.15);
        }

        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .hide-scroll::-webkit-scrollbar { display: none; }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; border: 2px solid #000; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        @keyframes scaleUpFade { 0% { opacity: 0; transform: translate3d(0, 15px, 0) scale(0.98); } 100% { opacity: 1; transform: translate3d(0, 0, 0) scale(1); } }
        .fade-in { animation: scaleUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; will-change: opacity, transform; }
        .anim-item { opacity: 0; animation: scaleUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; will-change: opacity, transform; }

        .bottom-sheet {
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
        }
        .bottom-sheet.open {
            transform: translateY(0);
        }
    </style>
</head>
<body class="text-slate-200">

    <div id="global-bg" class="fixed inset-0 z-[-3] bg-cover bg-center transition-opacity duration-1000 opacity-0 pointer-events-none transform translate-z-0"></div>

    <div id="app" role="main" class="w-full min-h-screen relative z-10 transition-colors duration-1000"></div>
    <div id="modal-root"></div>

    <script>
        // Use user-provided API key stored in localStorage
        let API_KEY = localStorage.getItem('tmdb_api_key') || '';
        
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMG_ORIGINAL = 'https://image.tmdb.org/t/p/original';
        const IMG_W500 = 'https://image.tmdb.org/t/p/w500';
        const IMG_W185 = 'https://image.tmdb.org/t/p/w185';

        const ACCENT_COLORS =[
            { name: 'Pastel Lilac', hex: '#E2D4E0' }, { name: 'Muted Mauve', hex: '#8C6B77' },
            { name: 'Rich Burgundy', hex: '#4A2E35' }, { name: 'Dark Navy', hex: '#2E3B4E' },
            { name: 'Pastel Slate', hex: '#7B8C9C' }, { name: 'Pastel Sage', hex: '#9EB3A2' },
            { name: 'Deep Forest', hex: '#415243' }, { name: 'Soft Amber', hex: '#D4A373' },
            { name: 'Rich Umber', hex: '#5C3D2E' }
        ];

        const FRANCHISES =[
            { name: "Marvel Cinematic Universe", items:[ { id: 1726, type: 'movie' }, { id: 24428, type: 'movie' }, { id: 299534, type: 'movie' }, { id: 84958, type: 'tv' } ] },
            { name: "Star Wars Saga", items:[ { id: 11, type: 'movie' }, { id: 1891, type: 'movie' }, { id: 1892, type: 'movie' }, { id: 82856, type: 'tv' } ] },
            { name: "DC Extended Universe", items:[ { id: 272, type: 'movie' }, { id: 49026, type: 'movie' }, { id: 297762, type: 'movie' }, { id: 110492, type: 'tv' } ] },
            { name: "Wizarding World", items:[ { id: 671, type: 'movie' }, { id: 672, type: 'movie' }, { id: 673, type: 'movie' }, { id: 674, type: 'movie' }, { id: 675, type: 'movie' }, { id: 767, type: 'movie' }, { id: 12444, type: 'movie' }, { id: 12445, type: 'movie' } ] },
            { name: "Middle Earth", items:[ { id: 120, type: 'movie' }, { id: 121, type: 'movie' }, { id: 122, type: 'movie' }, { id: 84773, type: 'tv' } ] }
        ];

        let state = {
            view: 'profiles', lastMainView: 'home', currentMediaId: null, currentMediaType: null, currentUser: null,
            profiles: JSON.parse(localStorage.getItem('profiles_v3')) ||[], watchlist:[], continueWatching:[], franchiseData: null,
            genres: { movie: [], tv:[] },
            filters: { movie: { page: 1, sort_by: 'popularity.desc', year: '', genre: '', rating: '' }, tv: { page: 1, sort_by: 'popularity.desc', year: '', genre: '', rating: '' } }
        };
        let tempState = { selectedColor: '#E2D4E0', searchTimeout: null };

        function hexToRgb(hex) {
            let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            return `${r}, ${g}, ${b}`;
        }
        const esc = (str) => String(str || '').replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag]));
        const getInitial = (name) => name ? name.charAt(0).toUpperCase() : '?';

        const techCardInner = () => `
            <div class="absolute inset-0 flex flex-col items-center justify-center opacity-[0.15] z-0">
                <svg class="w-6 h-6 text-accent opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path></svg>
            </div>
            <div class="absolute bottom-0 left-0 w-full p-4 z-10 flex flex-col gap-2">
                <div class="w-3/4 h-1.5 bg-white/5 rounded overflow-hidden relative"><div class="absolute inset-0 bg-white/20 shadow-[0_0_10px_#fff] -translate-x-full animate-[tech-slide_1.5s_infinite_linear]"></div></div>
                <div class="w-1/2 h-1.5 bg-accent/5 rounded overflow-hidden relative"><div class="absolute inset-0 bg-accent/30 shadow-[0_0_10px_var(--accent)] -translate-x-full animate-[tech-slide_1.5s_infinite_linear_150ms]"></div></div>
            </div>
            <div class="absolute top-0 left-0 w-full h-full shadow-[inset_0_0_20px_rgba(0,0,0,0.9)] pointer-events-none rounded-[inherit]"></div>
        `;

        const folderSkeletonInner = () => `
            <div class="absolute inset-0 flex items-center justify-center opacity-[0.12] z-0">
                <div class="w-12 h-12 rounded-full border border-dashed border-white/30"></div>
                <div class="absolute w-2 h-2 bg-accent rounded-full opacity-50"></div>
            </div>
            <div class="absolute bottom-0 left-0 w-full p-6 z-10 flex flex-col gap-3">
                <div class="w-2/3 h-2 bg-white/5 rounded overflow-hidden relative"><div class="absolute inset-0 bg-white/20 -translate-x-full animate-[tech-slide_1.5s_infinite_linear]"></div></div>
                <div class="w-1/3 h-1.5 bg-accent/5 rounded overflow-hidden relative"></div>
            </div>
            <div class="absolute top-0 left-0 w-full h-full shadow-[inset_0_0_30px_rgba(0,0,0,0.9)] pointer-events-none rounded-[inherit]"></div>
        `;

        const skeletonCard = (n=6) => `<div class="media-card aspect-[2/3] skeleton-container border-0 rounded-[1.25rem]">${techCardInner()}</div>`.repeat(n);
        const folderSkeleton = (n=4) => `<div class="media-card aspect-video skeleton-container border-0 rounded-[1.25rem]">${folderSkeletonInner()}</div>`.repeat(n);

        const rowSkeleton = (title) => `
            <section class="w-full mb-10 md:mb-12">
                <h3 class="font-mono-tech text-xs tracking-[0.2em] text-gray-500 mb-4 md:mb-6 uppercase border-l-2 border-white/10 pl-4 ml-6 md:ml-12">${title}</h3>
                <div class="flex overflow-hidden gap-4 md:gap-6 pb-8 pt-2 px-6 md:px-12">
                    ${`<div class="w-36 md:w-48 lg:w-56 aspect-[2/3] flex-shrink-0 skeleton-container rounded-[1.25rem]">${techCardInner()}</div>`.repeat(6)}
                </div>
            </section>
        `;

        const heroSkeletonHTML = () => `
            <header class="relative w-full h-[75vh] md:h-[85vh] skeleton-container border-0 flex flex-col justify-end p-6 md:p-12 isolate overflow-hidden pt-[max(1.5rem,env(safe-area-inset-top))]">
                <div class="absolute inset-0 bg-gradient-to-t from-[var(--bg-base)] via-[var(--bg-base)]/80 to-transparent z-0 pointer-events-none"></div>
                <div class="relative z-10 w-full max-w-4xl space-y-6 md:space-y-8 pb-12 md:pb-20 pl-0 md:pl-6">
                    <div class="w-24 h-6 bg-accent/10 border border-accent/30 rounded-full relative overflow-hidden">
                        <div class="absolute inset-0 bg-accent/20 -translate-x-full animate-[tech-slide_1.5s_infinite_linear]"></div>
                    </div>
                    <div class="w-3/4 md:w-2/3 h-12 md:h-20 bg-white/5 border-l-4 border-accent rounded-r-2xl relative overflow-hidden shadow-2xl">
                         <div class="absolute inset-0 bg-white/10 -translate-x-full animate-[tech-slide_2s_infinite_linear]"></div>
                    </div>
                    <div class="w-full md:w-3/4 space-y-3 pt-2">
                        <div class="w-full h-3 md:h-4 bg-white/5 rounded relative overflow-hidden"><div class="absolute inset-0 bg-white/10 -translate-x-full animate-[tech-slide_1.5s_infinite_linear_100ms]"></div></div>
                        <div class="w-11/12 h-3 md:h-4 bg-white/5 rounded relative overflow-hidden"><div class="absolute inset-0 bg-white/10 -translate-x-full animate-[tech-slide_1.5s_infinite_linear_200ms]"></div></div>
                        <div class="w-4/5 h-3 md:h-4 bg-white/5 rounded relative overflow-hidden"><div class="absolute inset-0 bg-white/10 -translate-x-full animate-[tech-slide_1.5s_infinite_linear_300ms]"></div></div>
                    </div>
                    <div class="flex gap-4 pt-6">
                        <div class="w-40 md:w-48 h-[48px] md:h-14 rounded-full border border-accent/40 bg-accent/10 relative overflow-hidden shadow-[0_0_20px_rgba(var(--accent-rgb),0.2)]"></div>
                        <div class="w-40 md:w-48 h-[48px] md:h-14 rounded-full border border-white/10 bg-white/5 relative overflow-hidden"></div>
                    </div>
                </div>
            </header>
        `;

        const detailsSkeleton = () => `
            <div class="fixed inset-0 bg-black/85 backdrop-blur-md z-[-1] pointer-events-none"></div>
            <div class="grid lg:grid-cols-[450px,1fr] gap-12 lg:gap-20 relative z-10 pt-[max(2rem,env(safe-area-inset-top))] items-start opacity-80 pointer-events-none">
                <div class="skeleton-container aspect-[2/3] rounded-[2rem] border border-white/10 w-full">${techCardInner()}</div>
                <div class="pt-4 space-y-8">
                    <div class="w-3/4 h-16 bg-white/5 rounded-2xl overflow-hidden relative"><div class="absolute inset-0 bg-white/10 -translate-x-full animate-[tech-slide_1.5s_infinite_linear]"></div></div>
                    <div class="w-1/3 h-6 bg-accent/10 rounded overflow-hidden relative"><div class="absolute inset-0 bg-accent/20 -translate-x-full animate-[tech-slide_1.5s_infinite_linear]"></div></div>
                    <div class="space-y-3">
                        <div class="w-full h-4 bg-white/5 rounded relative overflow-hidden"><div class="absolute inset-0 bg-white/10 -translate-x-full animate-[tech-slide_1.5s_infinite_linear_100ms]"></div></div>
                        <div class="w-11/12 h-4 bg-white/5 rounded relative overflow-hidden"><div class="absolute inset-0 bg-white/10 -translate-x-full animate-[tech-slide_1.5s_infinite_linear_200ms]"></div></div>
                        <div class="w-4/5 h-4 bg-white/5 rounded relative overflow-hidden"><div class="absolute inset-0 bg-white/10 -translate-x-full animate-[tech-slide_1.5s_infinite_linear_300ms]"></div></div>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-6 pt-8 border-t border-white/10">
                        <div class="w-full h-12 bg-white/5 rounded relative"></div><div class="w-full h-12 bg-white/5 rounded relative"></div>
                        <div class="w-full h-12 bg-white/5 rounded relative"></div><div class="w-full h-12 bg-white/5 rounded relative"></div>
                    </div>
                </div>
            </div>
        `;

        document.addEventListener('keydown', (e) => {
            if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) {
                if (e.key === 'Escape') e.target.blur();
                return;
            }
            if (e.key === 'Escape') {
                const modal = document.getElementById('modal-root');
                if (modal.innerHTML !== '') { closeModal(); return; }
                if (state.view === 'player') setView('details', state.currentMediaId, state.currentMediaType);
                else if (state.view === 'details') setView(state.lastMainView);
            }
        });

        window.addEventListener("message", (event) => {
            if (event.origin !== "https://www.vidsrc.wtf") return;
            if (event.data?.type === "MEDIA_DATA") {
                localStorage.setItem("vidsrcwtf-Progress", JSON.stringify(event.data.data));
            }
        });

        function saveToStorage(key, data) { try { localStorage.setItem(key, JSON.stringify(data)); } catch(e){} }
        function saveProfiles() { saveToStorage('profiles_v3', state.profiles); }

        function selectProfile(profileName) {
            state.currentUser = state.profiles.find(p => p.name === profileName);
            if (!state.currentUser) return;
            document.documentElement.style.setProperty('--accent', state.currentUser.color || '#E2D4E0');
            document.documentElement.style.setProperty('--accent-rgb', hexToRgb(state.currentUser.color || '#E2D4E0'));

            state.watchlist = JSON.parse(localStorage.getItem(`${state.currentUser.name}_wl`)) ||[];
            state.continueWatching = JSON.parse(localStorage.getItem(`${state.currentUser.name}_cw`)) ||[];
            setView('home');
        }

        function deleteProfile(name, event) {
            event.stopPropagation();
            if(confirm(`Delete ${name}'s profile?`)) {
                state.profiles = state.profiles.filter(p => p.name !== name);
                saveProfiles();
                setView('profiles');
            }
        }

        function getSources(id, type, s, e, imdbId) {
            const tmdb = id;
            const hexColor = (state.currentUser?.color || '#E2D4E0').replace('#', '');

            if (type === 'movie') {
                const sources =[
                    { name: 'VidSrc Prime 1', url: `https://vidsrc.wtf/api/1/movie/?id=${tmdb}&color=${hexColor}` },
                    { name: 'VidSrc Prime 2', url: `https://vidsrc.wtf/api/2/movie/?id=${tmdb}&color=${hexColor}` },
                    { name: 'VidSrc Prime 3', url: `https://vidsrc.wtf/api/3/movie/?id=${tmdb}` },
                    { name: 'VidSrc Prime 4', url: `https://vidsrc.wtf/api/4/movie/?id=${tmdb}` },
                    { name: 'AutoEmbed (Alpha)', url: `https://autoembed.co/movie/tmdb/${tmdb}` },
                    { name: '2embed Network', url: `https://www.2embed.online/embed/movie/${tmdb}` },
                    { name: 'HnEmbed (Beta)', url: `https://hnembed.cc/embed/movie/${tmdb}` },
                    { name: 'MoviesAPI Node', url: `https://moviesapi.club/movie/${tmdb}` },
                    { name: 'SmashyStream', url: `https://player.smashy.stream/movie/${tmdb}` },
                    { name: '111movies Hub', url: `https://111movies.net/movie/${tmdb}` }
                ];
                if (imdbId) sources.push({ name: 'Godrive Player', url: `https://godriveplayer.com/player.php?imdb=${imdbId}` });
                return sources;
            } else {
                return[

        async function fetchAPI(path, params = '') {
            try {
                const res = await fetch(`${BASE_URL}${path}?api_key=${API_KEY}${params}`);
                if (!res.ok) throw new Error('API Sync Failed');
                return await res.json();
            } catch (err) { return null; }
        }

        const fetchFranchises = async () => {
            if (!state.franchiseData) {
                state.franchiseData = await Promise.all(FRANCHISES.map(async (f, index) => {
                    const res = await fetchAPI(`/${f.items[0].type}/${f.items[0].id}`);
                    return { ...f, index, backdrop: res?.backdrop_path || '' };
                }));
            }
            return state.franchiseData;
        };

        window.observeLogos = () => {
            if (!window.logoObserver) {
                window.logoObserver = new IntersectionObserver((entries, observer) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const el = entry.target;
                            const id = el.dataset.id;
                            const type = el.dataset.type;
                            const isList = el.dataset.list === 'true';

                            if(el.dataset.fetching) return;
                            el.dataset.fetching = "true";

                            fetchAPI(`/${type}/${id}/images`, '&include_image_language=en,null').then(data => {
                                const logos = data?.logos;
                                if (logos && logos.length > 0) {
                                    const logo = logos.find(l => l.iso_639_1 === 'en') || logos[0];
                                    if (logo && logo.file_path) {
                                        const img = new Image();
                                        img.src = `${IMG_W500}${logo.file_path}`;

                                        let extraClass = isList
                                            ? "max-h-[35px] group-hover:scale-105"
                                            : "max-h-[60px] translate-y-0 group-hover:scale-[1.02]";

                                        img.className = `w-auto max-w-full object-contain object-left drop-shadow-[0_4px_10px_rgba(0,0,0,0.9)] transition-transform duration-500 fade-in ${extraClass}`;
                                        img.alt = "Logo";

                                        img.onload = () => {
                                            el.style.opacity = '0';
                                            setTimeout(() => { el.innerHTML = ''; el.appendChild(img); el.style.opacity = '1'; }, 300);
                                        };
                                    }
                                }
                            });
                            observer.unobserve(el);
                        }
                    });
                }, { rootMargin: '300px' });
            }

            document.querySelectorAll('.title-logo-target:not(.observed)').forEach(el => {
                el.classList.add('observed');
                window.logoObserver.observe(el);
            });
        };

                if (f.genre) queryStr += `&with_genres=${f.genre}`;
                if (f.year) queryStr += `&${targetType === 'movie' ? 'primary_release_year' : 'first_air_date_year'}=${f.year}`;
                if (f.rating) queryStr += `&vote_average.gte=${f.rating}`;

                fetchAPI(`/discover/${targetType}`, queryStr).then(res => {
                    const grid = document.getElementById('media-grid');
                    const loadBtn = document.getElementById('load-more-btn');
                    if (res?.results?.length > 0) {
                        if (!isAppend) grid.innerHTML = '';
                        const inject = res.results.map((m, i) => getMediaCard(m, targetType, isAppend ? 0 : i)).join('');
                        grid.insertAdjacentHTML('beforeend', inject);
                        if(!isAppend) { grid.classList.remove('fade-in'); void grid.offsetWidth; grid.classList.add('fade-in'); }
                        if(loadBtn) loadBtn.classList.remove('hidden');
                        setTimeout(() => window.observeLogos(), 100);
                    } else if (!isAppend) {
                        grid.innerHTML = '<div class="col-span-full font-mono-tech text-gray-500 py-24 text-center tracking-widest uppercase">No titles found matching your filters.</div>';
                        if(loadBtn) loadBtn.style.display = 'none';
                    }
                });
            }
            else if (view === 'details') {
                app.innerHTML = nav + `<div class="w-full flex justify-center pt-32 max-w-[1200px] mx-auto">${detailsSkeleton()}</div>`;

                Promise.all([
                    fetchAPI(`/${type}/${id}`),
                    fetchAPI(`/${type}/${id}/credits`),
                    fetchAPI(`/${type}/${id}/images`, '&include_image_language=en,null')
                ]).then(([m, credits, lData]) => {
                    if (!m) return app.innerHTML = nav + `<div class="text-center p-32 font-mono-tech text-red-500 uppercase tracking-widest">Title not found.</div>`;

                    window.tempSeasons = m.seasons ||[];
                    const playAction = type === 'movie' ? `setView('player', ${id}, 'movie', null, null, '${m.imdb_id || ''}')` : `showEpisodeModal(${id})`;

                    if(m.backdrop_path) {
                        const bgSrc = IMG_ORIGINAL + m.backdrop_path;
                        const img = new Image();
                        img.src = bgSrc;
                        img.onload = () => {
                            globalBg.style.backgroundImage = `url('${bgSrc}')`;
                            globalBg.classList.replace('opacity-0', 'opacity-40');
                        };
                    }

                    let detailsTitleHtml = `<h1 class="font-display text-5xl md:text-7xl font-bold tracking-tighter text-white leading-tight drop-shadow-2xl">${esc(m.title || m.name)}</h1>`;
                    if (lData?.logos?.length > 0) {
                        const logo = lData.logos.find(l => l.iso_639_1 === 'en') || lData.logos[0];
                        if (logo?.file_path) {
                            detailsTitleHtml = `<img src="${IMG_W500}${logo.file_path}" class="max-w-full md:max-w-[80%] lg:max-w-[70%] max-h-[140px] md:max-h-[200px] object-contain object-left drop-shadow-[0_0_30px_rgba(0,0,0,0.8)]" alt="${esc(m.title || m.name)}">`;
                        }
                    }

                    const contentHtml = `
                        <button onclick="setView('${state.lastMainView}')" class="absolute top-[max(1.5rem,env(safe-area-inset-top))] right-[max(1.5rem,env(safe-area-inset-right))] min-w-[48px] min-h-[48px] rounded-full bg-black/50 backdrop-blur-md border border-white/20 flex items-center justify-center text-2xl active:scale-90 z-50 outline-none">&times;</button>
                        <div class="grid lg:grid-cols-[450px,1fr] gap-12 lg:gap-20 relative z-10 pt-[max(2rem,env(safe-area-inset-top))] items-start">
                            <div class="sticky top-32 glass-panel p-2 rounded-[2rem] overflow-hidden group border border-white/10">
                                <img src="${m.poster_path ? IMG_W500 + m.poster_path : ''}" loading="lazy" class="w-full rounded-[1.5rem] shadow-2xl transform translate-z-0">
                            </div>
                            
                            <div class="pt-4 z-10" style="background: linear-gradient(0deg, var(--bg-base) 70%, transparent 100%);">
                                <div class="w-full mb-6">${detailsTitleHtml}</div>
                                
                                ${m.tagline ? `<p class="font-mono-tech text-sm uppercase tracking-[0.2em] text-accent mb-8 border-l-2 border-accent pl-4 py-1">${esc(m.tagline)}</p>` : '<div class="h-8"></div>'}
                                
                                <p class="font-sans text-lg md:text-xl text-gray-300 leading-relaxed font-light mb-12 max-w-4xl">${esc(m.overview || 'No overview available.')}</p>
                                
                                <div class="flex flex-wrap gap-4 mb-12">
                                    ${(m.genres ||[]).map(g => `<span class="px-4 py-2 rounded-full bg-white/5 border border-white/10 font-mono-tech text-[10px] tracking-widest uppercase text-gray-300">${g.name}</span>`).join('')}
                                </div>

                                <div class="grid grid-cols-2 md:grid-cols-4 gap-6 border-y border-white/10 py-8 mb-12">
                                    <div><div class="font-mono-tech text-[10px] text-gray-500 uppercase tracking-widest mb-2">Status</div><div class="font-display text-lg text-white">${esc(m.status)}</div></div>
                                    <div><div class="font-mono-tech text-[10px] text-gray-500 uppercase tracking-widest mb-2">Released</div><div class="font-display text-lg text-white">${esc(m.release_date || m.first_air_date || 'N/A')}</div></div>
                                    <div><div class="font-mono-tech text-[10px] text-gray-500 uppercase tracking-widest mb-2">Rating</div><div class="font-display text-lg text-accent font-bold">${m.vote_average ? m.vote_average.toFixed(1) : '0'} <span class="text-sm font-normal text-gray-500">/ 10</span></div></div>
                                    <div><div class="font-mono-tech text-[10px] text-gray-500 uppercase tracking-widest mb-2">Duration</div><div class="font-display text-lg text-white">${m.runtime || (m.episode_run_time?.[0]) || '?'} min</div></div>
                                </div>

                                <div class="flex flex-col sm:flex-row gap-6 mb-12">
                                    <button onclick="${playAction}" class="btn-glow flex-1 px-8 rounded-2xl font-display font-bold text-sm tracking-widest uppercase shadow-[0_0_30px_rgba(var(--accent-rgb),0.3)] flex items-center justify-center gap-3">
                                        <span class="w-2.5 h-2.5 rounded-full bg-black animate-pulse"></span> Play Now
                                    </button>
                                    <button onclick="addToWatchlist(${id}, '${type}')" class="btn-glass flex-1 px-8 rounded-2xl font-display font-bold text-sm tracking-widest uppercase flex items-center justify-center gap-3 text-white">
                                        Add to Watchlist
                                    </button>
                                </div>
                            </div>
                        </div>`;

                    app.innerHTML = nav + `
                        <div class="fixed inset-0 bg-black/85 backdrop-blur-md z-[-1] pointer-events-none transform translate-z-0"></div>
                        <div class="fixed inset-0 bg-gradient-to-t from-black via-black/80 to-transparent z-[-1] pointer-events-none"></div>
                        <div id="details-content" class="w-full">${contentHtml}</div>
                    `;
                    const dc = document.getElementById('details-content');
                    dc.classList.add('fade-in');
                });
            }
            else if (view === 'player') {
                const season = extra1, episode = extra2, imdbId = extra3;
                let nextEpBtn = '';

                app.innerHTML = nav + `
                    <div class="w-full max-w-[1400px] mx-auto anim-item relative z-10 pt-[max(1.5rem,env(safe-area-inset-top))]">
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-8 gap-6 border-b border-white/10 pb-6">
                            <div>
                                <h2 class="font-display text-2xl md:text-4xl font-bold text-white tracking-tight mb-3">Video Player</h2>
                                <div class="font-mono-tech text-[10px] text-gray-400 uppercase tracking-[0.2em] flex items-center gap-3">
                                    <span class="w-2 h-2 rounded-full bg-accent animate-pulse shadow-[0_0_10px_var(--accent)]"></span> 
                                    ID: ${id} • TYPE: ${type.toUpperCase()} ${season !== null ? `• S${season} E${episode}` : ''}
                                </div>
                            </div>
                            <div class="w-full md:w-auto" id="player-controls">
                                <!-- Controls injected -->
                            </div>
                        </div>
                        
                        <div class="relative w-full aspect-video bg-black rounded-3xl overflow-hidden shadow-[0_0_50px_rgba(var(--accent-rgb),0.15)] border border-white/10 group mb-8 skeleton-container" id="player-container">
                            ${folderSkeletonInner()}
                        </div>
                        <p class="mt-4 font-mono-tech text-[10px] text-center text-gray-500 uppercase tracking-widest opacity-80">If the video fails to load or buffers, select a different server below.</p>
                    </div>
                `;

                fetchAPI(`/${type}/${id}`).then(async details => {
                    if (details) {
                        addToContinueWatching({ id, type, title: details.title || details.name, poster_path: details.poster_path, season, episode });
                        if (type === 'tv') {
                            const sData = await fetchAPI(`/tv/${id}/season/${season}`);
                            let nextS = season, nextE = episode + 1;
                            if (sData && episode >= sData.episodes.length) {
                                if (details.seasons.find(s => s.season_number === season + 1)) { nextS = season + 1; nextE = 1; }
                                else nextE = null;
                            }
                            if (nextE) nextEpBtn = `<button onclick="setView('player', ${id}, 'tv', ${nextS}, ${nextE})" class="btn-glass px-6 rounded-lg font-mono-tech text-[10px] tracking-widest uppercase text-accent border-accent/50 flex items-center justify-center gap-2 flex-shrink-0">Next Ep &rarr;</button>`;
                        }
                    }

                    window.currentSources = getSources(id, type, season, episode, imdbId);
                    window.currentServerIndex = 0;

                    document.getElementById('player-controls').innerHTML = `
                        <div class="flex gap-3 items-center w-full justify-end">
                            ${nextEpBtn}
                            <button id="current-server-btn" onclick="showServerModal()" class="min-w-max h-[48px] px-6 rounded-full glass-panel active:scale-95 font-mono-tech text-[10px] tracking-widest uppercase hover:bg-white/10 transition-colors text-white outline-none flex items-center shadow-lg border-white/20">
                                Server: ${window.currentSources[0].name} <svg class="w-4 h-4 ml-2 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </button>
                            <button onclick="setView('details', ${id}, '${type}')" class="min-w-[48px] min-h-[48px] flex items-center justify-center rounded-full glass-panel active:scale-95 flex-shrink-0 text-gray-300 outline-none">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                            </button>
                        </div>
                    `;

                    document.getElementById('player-container').innerHTML = `<iframe id="video-frame" src="${window.currentSources[0].url}" class="absolute inset-0 w-full h-full z-10 bg-black rounded-3xl transition-opacity duration-1000 transform translate-z-0" frameborder="0" allowfullscreen onload="this.style.opacity='1'" style="opacity:0;"></iframe>`;
                });
            }
            else if (view === 'search') {
                app.innerHTML = nav + `
                    <div class="anim-item max-w-5xl mx-auto flex flex-col h-full">
                        <div class="sticky top-0 z-[60] bg-black/90 backdrop-blur-xl pt-[max(1rem,env(safe-area-inset-top))] pb-4 px-6 md:px-12 border-b border-white/10 w-full">
                            <div class="relative flex items-center gap-4">
                                <button onclick="setView(state.lastMainView)" class="min-w-[48px] min-h-[48px] rounded-full glass-panel flex items-center justify-center active:scale-95 text-gray-400 outline-none">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                </button>
                                <input type="text" id="sInput" placeholder="Search movies, shows..." class="w-full bg-transparent text-3xl md:text-4xl font-display font-bold outline-none text-white focus:border-accent min-h-[48px] tracking-tight">
                            </div>
                        </div>
                        <div id="results" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6 p-6 overflow-y-auto"></div>
                    </div>`;

                const sInput = document.getElementById('sInput');
                setTimeout(() => sInput.focus(), 100);

                sInput.addEventListener('input', (e) => {
                    clearTimeout(tempState.searchTimeout);
                    const query = e.target.value.trim();
                    if(query.length < 2) return document.getElementById('results').innerHTML = '';

                    tempState.searchTimeout = setTimeout(() => {
                        fetchAPI(`/search/multi`, `&query=${encodeURIComponent(query)}`).then(res => {
                            if(res?.results) {
                                const grid = document.getElementById('results');
                                grid.innerHTML = res.results
                                    .filter(m => m.media_type === 'movie' || m.media_type === 'tv')
                                    .slice(0, 15)
                                    .map((m, i) => getMediaCard(m, m.media_type, i))
                                    .join('');
                                grid.classList.remove('fade-in'); void grid.offsetWidth; grid.classList.add('fade-in');
                                setTimeout(() => window.observeLogos(), 100);
                            }
                        });
                    }, 400);
                });
            }
            else if (view === 'watchlist') {
                app.innerHTML = nav + `
                    <div id="content" class="w-full">
                        <div class="flex items-end justify-between mb-12 border-b border-white/10 pb-6 anim-item">
                            <div>
                                <h2 class="font-display text-4xl text-white font-bold tracking-tight">My Watchlist</h2>
                                <p class="font-mono-tech text-xs tracking-[0.2em] text-accent uppercase mt-2">Profile: ${esc(state.currentUser.name)}</p>
                            </div>
                        </div>
                        <div id="w-list" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6">${skeletonCard(6)}</div>
                    </div>
                `;

                Promise.all(state.watchlist.map(async item => {
                    const res = await fetchAPI(`/${item.type}/${item.id}`);
                    if(res) res.media_type = item.type;
                    return res;
                })).then(list => {
                    const validList = list.filter(Boolean);
                    const grid = document.getElementById('w-list');
                    grid.innerHTML = validList.length
                        ? validList.map((m, i) => getMediaCard(m, m.media_type, i, `removeFromWatchlist(${m.id}, event)`)).join('')
                        : '<div class="col-span-full font-mono-tech text-gray-500 py-24 text-center tracking-widest uppercase">Your watchlist is empty.</div>';
                    grid.classList.remove('fade-in'); void grid.offsetWidth; grid.classList.add('fade-in');
                    setTimeout(() => window.observeLogos(), 100);
                });
            }
        }

        // Initialization Logic
        if (API_KEY) {
            setView('profiles');
        } else {
            setView('setup');
        }
    </script>
</body>
</html>
